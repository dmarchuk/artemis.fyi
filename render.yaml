services:
  - type: web
    name: artemis-fyi
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/data/artemis.db
    disk:
      name: artemis-data
      mountPath: /opt/render/project/data
      sizeGB: 1
