<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a1a"/>
  <!-- SRBs (solid rocket boosters) -->
  <rect x="10" y="10" width="3" height="16" rx="1" fill="#e8e0d8"/>
  <rect x="19" y="10" width="3" height="16" rx="1" fill="#e8e0d8"/>
  <!-- SRB nozzles -->
  <rect x="10" y="26" width="3" height="2" rx="0.5" fill="#555"/>
  <rect x="19" y="26" width="3" height="2" rx="0.5" fill="#555"/>
  <!-- SRB nose cones -->
  <path d="M10 10 L11.5 7 L13 10z" fill="#e8e0d8"/>
  <path d="M19 10 L20.5 7 L22 10z" fill="#e8e0d8"/>
  <!-- Core stage (orange tank) -->
  <rect x="13" y="8" width="6" height="18" rx="1" fill="#d4722a"/>
  <!-- Core nozzles -->
  <rect x="14" y="26" width="4" height="2" rx="0.5" fill="#555"/>
  <!-- Orion capsule (white) -->
  <rect x="14" y="5" width="4" height="3" rx="1" fill="#e8e0d8"/>
  <!-- Launch escape tower -->
  <line x1="16" y1="5" x2="16" y2="2" stroke="#ccc" stroke-width="1" stroke-linecap="round"/>
  <!-- Blue Orion window -->
  <rect x="15" y="6" width="2" height="1" rx="0.5" fill="#3b82f6"/>
</svg>
